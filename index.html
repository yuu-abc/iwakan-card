<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7f5f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="違和感カード" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>違和感カード</title>
  <style>
    :root {
      --bg: #f7f5f1;
      --paper: #ffffff;
      --ink: #24211e;
      --muted: #706a63;
      --line: #e5ded4;
      --accent: #7c5f45;
      --accent-dark: #5f4630;
      --danger: #b65454;
      --favorite: #d69a2d;
      --soft: #eee7dc;
      --tag: #f1eadf;
      --shadow: 0 12px 30px rgba(40, 32, 24, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 95, 69, 0.10), transparent 30%),
        var(--bg);
      color: var(--ink);
      line-height: 1.7;
    }

    header {
      padding: 34px 18px 18px;
      text-align: center;
    }

    .app-title {
      margin: 0;
      font-size: clamp(28px, 7vw, 46px);
      letter-spacing: 0.08em;
      font-weight: 800;
    }

    .subtitle {
      margin: 8px auto 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 15px;
    }

    main {
      width: min(1100px, calc(100% - 28px));
      margin: 0 auto 48px;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      align-items: start;
    }

    .workflow-panel {
      padding: 0;
      overflow: hidden;
    }

    .workflow-intro {
      padding: 22px 22px 18px;
      background: linear-gradient(135deg, #fffdf9, #f0e7dc);
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 7px;
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .workflow-intro h2 {
      margin-bottom: 4px;
      font-size: 22px;
    }

    .workflow-intro p {
      max-width: 680px;
      color: var(--muted);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .step-number {
      display: grid;
      place-items: center;
      flex: 0 0 24px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--soft);
      color: var(--accent-dark);
      font-size: 12px;
    }

    .step.current {
      background: var(--accent-dark);
      color: #fff;
    }

    .step.current .step-number {
      background: #fff;
    }

    .workflow-content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 20px;
      padding: 20px 22px 22px;
    }

    .memo-input {
      min-height: 190px;
      margin-top: 10px;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.7;
    }

    .memo-feedback {
      min-height: 24px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .json-stage {
      grid-column: 1 / -1;
      padding-top: 4px;
      border-top: 1px solid var(--line);
    }

    .input-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .input-heading h3 {
      margin: 0;
    }

    .input-heading .hint {
      margin: 0;
    }

    .json-input {
      min-height: 260px;
      margin-top: 10px;
    }

    .composer-feedback {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .composer-feedback.ok { color: #31724b; }
    .composer-feedback.error { color: var(--danger); }

    .save-action {
      min-width: 180px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
    }

    button:disabled:hover {
      background: var(--accent);
      transform: none;
    }

    .prompt-help {
      align-self: start;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fcfaf7;
      overflow: hidden;
    }

    .prompt-help summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      cursor: pointer;
      color: var(--accent-dark);
      font-weight: 800;
      list-style: none;
    }

    .prompt-help summary::-webkit-details-marker { display: none; }
    .prompt-help summary::after { content: "⌄"; font-size: 18px; }
    .prompt-help[open] summary::after { transform: rotate(180deg); }

    .prompt-help-body {
      padding: 0 14px 14px;
      border-top: 1px solid var(--line);
    }

    .prompt-help .template-box {
      max-height: 250px;
      margin: 12px 0;
    }

    .card-count {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .data-menu {
      margin-top: 10px;
      text-align: right;
    }

    .data-menu summary {
      display: inline-flex;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
    }

    .data-menu .toolbar-right {
      justify-content: flex-end;
      margin-top: 10px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    h3 {
      margin: 16px 0 6px;
      font-size: 15px;
    }

    p {
      margin: 0 0 10px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--paper);
      color: var(--ink);
      font: inherit;
      padding: 12px;
      outline: none;
    }

    textarea {
      min-height: 320px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.55;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124, 95, 69, 0.12);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .category-buttons {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 8px;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }

    .category-filter-button {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 8px 13px;
      background: var(--soft);
      color: var(--ink);
      border: 1px solid var(--line);
      font-size: 13px;
      white-space: nowrap;
    }

    .category-filter-button.active {
      background: var(--accent-dark);
      color: #fff;
      border-color: var(--accent-dark);
    }

    button,
    .file-label {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      padding: 10px 15px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 42px;
    }

    button:hover,
    .file-label:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    button.secondary,
    .file-label.secondary {
      background: var(--soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    button.secondary:hover,
    .file-label.secondary:hover {
      background: #e4d8c8;
    }

    button.secondary.active {
      background: var(--accent-dark);
      color: #fff;
      border-color: var(--accent-dark);
    }

    button.danger {
      background: var(--danger);
    }

    button.ghost {
      background: transparent;
      color: var(--accent-dark);
      border: 1px solid var(--line);
    }

    .status {
      min-height: 28px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.ok {
      color: #31724b;
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .template-box {
      background: #2b2824;
      color: #f6efe6;
      border-radius: 16px;
      padding: 14px;
      white-space: pre-wrap;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      max-height: 360px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: end;
    }

    .toolbar-left {
      flex: 1 1 420px;
    }

    .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 8px 20px rgba(40, 32, 24, 0.06);
      display: grid;
      gap: 10px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .card-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.4;
    }

    .card-title-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .favorite-mark {
      color: var(--favorite);
      font-size: 18px;
      line-height: 1.4;
    }

    .date {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .category,
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      line-height: 1.3;
    }

    .category {
      background: #ded2c2;
      color: #402f20;
      font-weight: 700;
    }

    .tag {
      background: var(--tag);
      color: #5b5147;
    }

    .card-actions {
      align-items: stretch;
    }

    .icon-button {
      min-width: 42px;
      padding-inline: 12px;
    }

    .favorite-button.active {
      background: #fff5dc;
      border-color: #e7c778;
      color: #79530a;
    }

    .favorite-button.active:hover {
      background: #f5e4b7;
    }

    .card-body,
    .card-details {
      display: grid;
      gap: 10px;
    }

    .card-details {
      padding-top: 2px;
    }

    .details-button {
      justify-self: start;
    }

    .field {
      border-top: 1px solid var(--line);
      padding-top: 9px;
    }

    .field strong {
      display: block;
      font-size: 12px;
      color: var(--accent-dark);
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .field span {
      display: block;
      white-space: pre-wrap;
    }

    .card-image {
      display: block;
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--line);
      margin: 4px 0 8px;
      background: var(--soft);
    }


    .carousel-nav {
      display: none;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 28px 10px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.55);
    }

    .hidden {
      display: none !important;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    input[type="file"] {
      display: none;
    }

    dialog {
      width: min(780px, calc(100% - 24px));
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 0;
      box-shadow: var(--shadow);
    }

    dialog::backdrop {
      background: rgba(20, 16, 12, 0.35);
    }

    .dialog-inner {
      padding: 18px;
      background: var(--bg);
    }

    .edit-sheet {
      width: min(760px, 100%);
      max-height: min(88vh, 900px);
      margin: auto auto 0;
      border: 1px solid var(--line);
      border-radius: 24px 24px 0 0;
      padding: 0;
      box-shadow: 0 -18px 50px rgba(40, 32, 24, 0.18);
      background: var(--bg);
      overflow: hidden;
    }

    .edit-sheet[open] {
      animation: sheetUp 0.22s ease-out;
    }

    @keyframes sheetUp {
      from {
        opacity: 0;
        transform: translateY(36px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .edit-sheet::backdrop {
      background: rgba(20, 16, 12, 0.42);
    }

    .edit-sheet .dialog-inner {
      max-height: min(88vh, 900px);
      overflow-y: auto;
      padding: 18px;
      background: var(--bg);
    }

    .edit-sheet-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding-bottom: 12px;
      background: linear-gradient(var(--bg) 80%, rgba(247, 245, 241, 0));
    }

    .sheet-close {
      flex: 0 0 auto;
      width: 44px;
      min-width: 44px;
      padding: 0;
      font-size: 24px;
      line-height: 1;
    }

    .edit-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .edit-field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .edit-field span {
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .edit-field textarea {
      min-height: 120px;
      font-family: inherit;
      font-size: 16px;
      line-height: 1.65;
    }


    .edit-sticky-actions {
      position: sticky;
      bottom: 0;
      display: flex;
      gap: 10px;
      margin: 16px -18px -18px;
      padding: 12px 18px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(247, 245, 241, 0.96);
      backdrop-filter: blur(8px);
    }

    .edit-sticky-actions button {
      flex: 1;
      min-height: 48px;
    }


    @media (max-width: 820px) {
      main {
        width: min(100% - 20px, 1100px);
        gap: 14px;
      }

      .panel {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .workflow-intro,
      .workflow-content {
        padding-left: 14px;
        padding-right: 14px;
      }

      .workflow-content {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .steps {
        grid-template-columns: 1fr;
      }

      .step {
        padding: 9px 10px;
      }

      .json-input {
        min-height: 230px;
      }

      .memo-input {
        min-height: 160px;
      }

      .cards {
        display: flex;
        grid-template-columns: none;
        gap: 12px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        padding: 2px 0 12px;
      }

      .card {
        flex: 0 0 100%;
        scroll-snap-align: center;
        min-height: 60vh;
        align-content: start;
      }

      .carousel-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 14px;
      }

      .carousel-nav button {
        width: 44px;
        min-width: 44px;
        padding: 0;
      }

      .category-filter-button {
        width: auto;
      }

      .carousel-position {
        min-width: 68px;
        text-align: center;
        color: var(--muted);
        font-weight: 700;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      header {
        text-align: left;
        width: min(1100px, calc(100% - 28px));
        margin: 0 auto;
        padding-left: 0;
        padding-right: 0;
      }

      .toolbar {
        align-items: stretch;
      }

      .toolbar-right,
      .toolbar-left {
        width: 100%;
      }

      .data-menu {
        text-align: left;
      }

      .data-menu .toolbar-right {
        justify-content: stretch;
      }

      button,
      .file-label {
        width: 100%;
      }

      .row > button,
      .row > .file-label {
        flex: 1 1 160px;
      }

      .edit-sheet {
        width: 100%;
        max-height: 92vh;
      }

      .edit-sheet .dialog-inner {
        max-height: 92vh;
        padding: 16px;
      }

      .edit-form-grid {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .edit-field input,
      .edit-field select {
        min-height: 48px;
        font-size: 16px;
      }

      .edit-field textarea {
        min-height: 140px;
      }

      .edit-sticky-actions {
        margin-left: -16px;
        margin-right: -16px;
        margin-bottom: -16px;
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1 class="app-title">違和感カード</h1>
    <p class="subtitle">
      小さな引っかかりを、流さずに残すためのカード型メモです。
      JSONを貼り付けて保存すると、「違和感」「隠れた前提」「本当の論点」「線引き」をあとで見返せます。
    </p>
  </header>

  <main>
    <section class="panel workflow-panel" aria-labelledby="workflowTitle">
      <div class="workflow-intro">
        <p class="eyebrow">保存まで約1分</p>
        <h2 id="workflowTitle">メモをカードにする</h2>
        <p>気になったことをそのまま書くと、ChatGPTに渡すJSON整形の依頼文を作れます。</p>
        <div class="steps" aria-label="カードを保存する手順">
          <div id="memoStep" class="step current"><span class="step-number">1</span><span>気になったことを書く</span></div>
          <div id="jsonStep" class="step"><span class="step-number">2</span><span>JSONを貼り付ける</span></div>
          <div id="saveStep" class="step"><span class="step-number">3</span><span>カードとして保存</span></div>
        </div>
      </div>

      <div class="workflow-content">
        <div>
          <div class="input-heading">
            <h3>① 気になったことをそのまま書く</h3>
            <p class="hint">箇条書き・話し言葉のままでOK</p>
          </div>
          <textarea id="memoInput" class="memo-input" aria-label="自由メモ入力欄" placeholder="例：会議では改善と言われていたが、…4515 tokens truncated… memo = memoInput.value.trim();
      localStorage.setItem(MEMO_DRAFT_STORAGE_KEY, memoInput.value);
      createPromptBtn.disabled = !memo;

      if (!memo) {
        promptBox.textContent = "上の枠にメモを入力すると、ここにChatGPTへ渡す依頼文が表示されます。";
        memoFeedback.textContent = "入力内容をもとに、ChatGPTへ渡す依頼文を作ります。";
        return;
      }

      promptBox.textContent = buildChatGptPrompt(memo);
      memoFeedback.textContent = `${memo.length}文字のメモから依頼文を作成できます。`;
    }

    async function copyGeneratedPrompt() {
      const memo = memoInput.value.trim();
      if (!memo) {
        setStatus("先に気になったことを入力してください。", "error");
        return;
      }

      promptHelp.open = true;
      setWorkflowStep("json");
      try {
        await navigator.clipboard.writeText(buildChatGptPrompt(memo));
        setStatus("ChatGPT用の依頼文をコピーしました。ChatGPTに貼り付け、返ってきたJSONを次の欄へ貼り付けてください。", "ok");
      } catch (error) {
        setStatus("依頼文を表示しました。コピーできない場合は、表示された文章を選択してコピーしてください。", "ok");
      }
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = "status " + type;
    }

    function isMeaningfulCard(card) {
      return Boolean(card.title && card.title !== "無題の違和感") || Boolean(card.memo.trim()) || Boolean(card.iwakan.trim()) || Boolean(card.realIssue.trim());
    }

    function updateComposer() {
      const text = jsonInput.value.trim();
      localStorage.setItem(DRAFT_STORAGE_KEY, jsonInput.value);

      if (!text) {
        saveBtn.disabled = true;
        composerFeedback.textContent = "JSONを貼り付けると、ここで保存前に確認できます。";
        composerFeedback.className = "composer-feedback";
        setWorkflowStep(memoInput.value.trim() ? "json" : "memo");
        return;
      }

      try {
        const parsed = parseJson(text);
        const meaningful = parsed.filter(isMeaningfulCard);
        if (!meaningful.length) {
          saveBtn.disabled = true;
          composerFeedback.textContent = "カードの内容を入力してください。タイトル・元メモ・違和感・本当の論点のいずれかが必要です。";
          composerFeedback.className = "composer-feedback error";
          return;
        }

        const first = meaningful[0];
        const label = first.title || "無題の違和感";
        const category = first.category ? ` / ${first.category}` : "";
        composerFeedback.textContent = `${meaningful.length}件を保存できます：${label}${category}`;
        composerFeedback.className = "composer-feedback ok";
        saveBtn.disabled = false;
        setWorkflowStep("save");
      } catch (error) {
        saveBtn.disabled = true;
        composerFeedback.textContent = error.message;
        composerFeedback.className = "composer-feedback error";
        setWorkflowStep("json");
      }
    }

    function setEditStatus(message, type = "") {
      editStatus.textContent = message;
      editStatus.className = "status " + type;
    }

    function render() {
      updateFilters();
      const keyword = searchInput.value.trim().toLowerCase();
      const category = selectedCategory;
      favoriteFilterBtn.classList.toggle("active", showFavoritesOnly);
      favoriteFilterBtn.setAttribute("aria-pressed", String(showFavoritesOnly));

      const savedCardCount = cards.filter(card => card.id !== "sample-001").length;
      cardCount.textContent = savedCardCount ? `${savedCardCount}件のカード` : "お試しカードを表示中";

      const filtered = cards.filter(card => {
        const text = [
          card.title,
          card.memo,
          card.category,
          ...(card.tags || []),
          card.iwakan,
          card.surfaceExplanation,
          card.hiddenAssumption,
          card.realIssue,
          card.boundary,
          card.nextWatch,
          card.image?.caption,
          card.image?.alt,
          card.image?.fileName,
          card.isFavorite ? "お気に入り favorite" : ""
        ].join(" ").toLowerCase();

        const matchKeyword = !keyword || text.includes(keyword);
        const matchCategory = !category || card.category === category;
        const matchFavorite = !showFavoritesOnly || card.isFavorite;
        return matchKeyword && matchCategory && matchFavorite;
      });

      cardsEl.innerHTML = "";
      currentFilteredCount = filtered.length;
      carouselIndex = 0;
      updateCarouselPosition();

      if (filtered.length === 0) {
        emptyEl.classList.remove("hidden");
        return;
      }

      emptyEl.classList.add("hidden");

      filtered
        .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
        .forEach(card => {
          cardsEl.appendChild(createCardElement(card));
        });
      cardsEl.scrollLeft = 0;
      updateCarouselPosition();
    }

    function updateFilters() {
      const categories = [...new Set([...baseCategories, ...cards.map(card => card.category).filter(Boolean)])];
      if (!categories.includes(selectedCategory)) selectedCategory = "";

      categoryFilter.innerHTML = "";
      categories.forEach(category => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `category-filter-button${category === selectedCategory ? " active" : ""}`;
        button.dataset.category = category;
        button.setAttribute("role", "option");
        button.setAttribute("aria-selected", String(category === selectedCategory));
        button.textContent = category || "すべて";
        categoryFilter.appendChild(button);
      });
    }

    function updateCarouselPosition() {
      const total = currentFilteredCount;
      const current = total === 0 ? 0 : Math.min(carouselIndex + 1, total);
      carouselPosition.textContent = `${current} / ${total}`;
      prevCardBtn.disabled = total <= 1 || carouselIndex === 0;
      nextCardBtn.disabled = total <= 1 || carouselIndex >= total - 1;
    }

    function scrollCarousel(direction) {
      if (!currentFilteredCount) return;
      carouselIndex = Math.max(0, Math.min(currentFilteredCount - 1, carouselIndex + direction));
      const target = cardsEl.children[carouselIndex];
      if (target) target.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      updateCarouselPosition();
    }

    function createCardElement(card) {
      const article = document.createElement("article");
      article.className = "card";

      const tagsHtml = (card.tags || []).map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join("");

      article.innerHTML = `
        <div class="card-head">
          <div>
            <div class="card-title-row">
              ${card.isFavorite ? `<span class="favorite-mark" aria-label="お気に入り">★</span>` : ""}
              <h3 class="card-title">${escapeHtml(card.title)}</h3>
            </div>
            <div class="meta">
              ${card.category ? `<span class="category">${escapeHtml(card.category)}</span>` : ""}
              ${tagsHtml}
            </div>
          </div>
          <span class="date">${formatDate(card.createdAt)}</span>
        </div>

        <div class="card-body" id="card-body-${escapeAttribute(card.id)}">
          ${fieldHtml("違和感", card.iwakan)}
          ${fieldHtml("本当の論点", card.realIssue)}
          ${fieldHtml("次に見るもの", card.nextWatch)}
        </div>

        <div class="card-details${card.isDetailsOpen ? "" : " hidden"}" id="card-details-${escapeAttribute(card.id)}">
          ${fieldHtml("表向きの説明", card.surfaceExplanation)}
          ${fieldHtml("隠れた前提", card.hiddenAssumption)}
          ${fieldHtml("線引き", card.boundary)}
          ${fieldHtml("元メモ", card.memo)}
          ${imageHtml(card.image)}
        </div>

        <button class="secondary details-button" data-action="toggle-details" data-id="${escapeAttribute(card.id)}" aria-expanded="${card.isDetailsOpen}" aria-controls="card-details-${escapeAttribute(card.id)}">${card.isDetailsOpen ? "閉じる" : "詳しく見る"}</button>

        <div class="row card-actions">
          <button class="ghost icon-button favorite-button${card.isFavorite ? " active" : ""}" data-action="favorite" data-id="${escapeAttribute(card.id)}" aria-pressed="${card.isFavorite}">${card.isFavorite ? "★ お気に入り" : "☆ お気に入り"}</button>
          <button class="secondary" data-action="edit" data-id="${escapeAttribute(card.id)}">編集</button>
          <button class="ghost" data-action="copy" data-id="${escapeAttribute(card.id)}">JSONコピー</button>
          <button class="danger" data-action="delete" data-id="${escapeAttribute(card.id)}">削除</button>
        </div>
      `;

      article.addEventListener("click", event => {
        const button = event.target.closest("button");
        if (!button) return;

        const action = button.dataset.action;
        const id = button.dataset.id;

        if (action === "favorite") toggleFavorite(id);
        if (action === "toggle-details") toggleDetails(id, button);
        if (action === "edit") openEdit(id);
        if (action === "copy") copyCardJson(id);
        if (action === "delete") deleteCard(id);
      });

      return article;
    }

    function imageHtml(image) {
      if (!hasImage(image)) return "";
      const src = image.dataUrl || image.url;
      const preview = src ? `<img class="card-image" src="${escapeAttribute(src)}" alt="${escapeAttribute(image.alt || image.caption || "カード画像")}" loading="lazy">` : "";
      return `
        <div class="field">
          <strong>画像</strong>
          ${preview}
          ${image.caption ? `<span>${escapeHtml(image.caption)}</span>` : ""}
          ${image.fileName ? `<span class="small">${escapeHtml(image.fileName)}</span>` : ""}
        </div>
      `;
    }

    function fieldHtml(label, value) {
      if (!value) return "";
      return `
        <div class="field">
          <strong>${escapeHtml(label)}</strong>
          <span>${escapeHtml(value)}</span>
        </div>
      `;
    }

    function formatDate(iso) {
      if (!iso) return "";
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString("ja-JP");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }


    function updateCardState(id, changes, message) {
      cards = cards.map(card => {
        if (card.id !== id) return card;
        return {
          ...card,
          ...changes,
          updatedAt: new Date().toISOString()
        };
      });
      saveCards();
      render();
      if (message) setStatus(message, "ok");
    }

    function toggleFavorite(id) {
      const card = cards.find(item => item.id === id);
      if (!card) return;
      updateCardState(
        id,
        { isFavorite: !card.isFavorite },
        !card.isFavorite ? "お気に入りに追加しました。" : "お気に入りを解除しました。"
      );
    }

    function toggleDetails(id, button) {
      const card = cards.find(item => item.id === id);
      const targetCard = button?.closest(".card");
      const details = targetCard?.querySelector(".card-details");
      if (!card || !details || !button) return;

      const isOpen = details.classList.contains("hidden");
      card.isDetailsOpen = isOpen;
      saveCards();

      details.classList.toggle("hidden", !isOpen);
      button.setAttribute("aria-expanded", String(isOpen));
      button.textContent = isOpen ? "閉じる" : "詳しく見る";

      setStatus(isOpen ? "詳しい項目を表示しました。" : "詳しい項目を閉じました。", "ok");
    }

    function saveInputCards() {
      try {
        const newCards = parseJson(jsonInput.value).filter(isMeaningfulCard);
        if (!newCards.length) throw new Error("カードの内容を入力してください。");
        cards = cards.filter(card => card.id !== "sample-001");
        cards = [...newCards, ...cards];
        saveCards();
        render();
        jsonInput.value = "";
        localStorage.removeItem(DRAFT_STORAGE_KEY);
        updateComposer();
        setStatus(`${newCards.length}件のカードを保存しました。`, "ok");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    function openEdit(id) {
      const card = cards.find(item => item.id === id);
      if (!card) return;

      editingId = id;
      editFields.title.value = card.title || "";
      editFields.category.value = card.category || "";
      editFields.tags.value = (card.tags || []).join(", ");
      editFields.memo.value = card.memo || "";
      editFields.iwakan.value = card.iwakan || "";
      editFields.surfaceExplanation.value = card.surfaceExplanation || "";
      editFields.hiddenAssumption.value = card.hiddenAssumption || "";
      editFields.realIssue.value = card.realIssue || "";
      editFields.boundary.value = card.boundary || "";
      editFields.nextWatch.value = card.nextWatch || "";
      setEditStatus("");
      editDialog.showModal();
    }

    function updateEditingCard() {
      const existing = cards.find(card => card.id === editingId);
      if (!existing) return;

      const updated = {
        ...existing,
        title: editFields.title.value.trim() || "無題の違和感",
        category: editFields.category.value,
        tags: editFields.tags.value.split(",").map(tag => tag.trim()).filter(Boolean),
        memo: editFields.memo.value,
        iwakan: editFields.iwakan.value,
        surfaceExplanation: editFields.surfaceExplanation.value,
        hiddenAssumption: editFields.hiddenAssumption.value,
        realIssue: editFields.realIssue.value,
        boundary: editFields.boundary.value,
        nextWatch: editFields.nextWatch.value,
        image: existing.image,
        createdAt: existing.createdAt,
        updatedAt: new Date().toISOString()
      };

      cards = cards.map(card => card.id === editingId ? updated : card);
      saveCards();
      render();
      setStatus("カードを更新しました。", "ok");
      editDialog.close();
    }

    function deleteCard(id) {
      const card = cards.find(item => item.id === id);
      if (!card) return;

      if (!confirm(`「${card.title}」を削除しますか？`)) return;

      cards = cards.filter(item => item.id !== id);
      saveCards();
      render();
      setStatus("カードを削除しました。", "ok");
    }

    async function copyCardJson(id) {
      const card = cards.find(item => item.id === id);
      if (!card) return;

      await navigator.clipboard.writeText(JSON.stringify(card, null, 2));
      setStatus("カードのJSONをコピーしました。", "ok");
    }

    function exportCards() {
      const exportData = cards.filter(card => card.id !== "sample-001");
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `iwakan-cards-${date}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importCards(file) {
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = parseCardText(reader.result).map(item => normalizeCard(item));
          cards = cards.filter(card => card.id !== "sample-001");
          cards = [...imported, ...cards];
          saveCards();
          render();
          setStatus(`${imported.length}件をインポートしました。`, "ok");
        } catch (error) {
          setStatus(`インポートできませんでした。${error.message}`, "error");
        }
      };
      reader.readAsText(file);
    }

    function deleteAllCards() {
      if (!confirm("保存したカードをすべて削除しますか？")) return;
      cards = [];
      saveCards();
      render();
      setStatus("すべて削除しました。", "ok");
    }

    saveBtn.addEventListener("click", saveInputCards);
    clearBtn.addEventListener("click", () => {
      jsonInput.value = "";
      localStorage.removeItem(DRAFT_STORAGE_KEY);
      updateComposer();
      setStatus("入力欄をクリアしました。", "ok");
    });


    createPromptBtn.addEventListener("click", copyGeneratedPrompt);
    copyPromptBtn.addEventListener("click", copyGeneratedPrompt);

    loadTemplateBtn.addEventListener("click", () => {
      jsonInput.value = JSON.stringify(emptyTemplate, null, 2);
      updateComposer();
      setStatus("空JSONを入力欄に入れました。", "ok");
    });

    memoInput.addEventListener("input", () => {
      updatePromptPreview();
      updateComposer();
    });
    jsonInput.addEventListener("input", updateComposer);
    searchInput.addEventListener("input", render);
    categoryFilter.addEventListener("click", event => {
      const button = event.target.closest("button[data-category]");
      if (!button) return;
      selectedCategory = button.dataset.category;
      render();
    });
    cardsEl.addEventListener("scroll", () => {
      window.requestAnimationFrame(() => {
        const firstCard = cardsEl.children[0];
        if (!firstCard) return;
        const gap = 12;
        const cardWidth = firstCard.getBoundingClientRect().width + gap;
        carouselIndex = Math.max(0, Math.min(currentFilteredCount - 1, Math.round(cardsEl.scrollLeft / cardWidth)));
        updateCarouselPosition();
      });
    });
    prevCardBtn.addEventListener("click", () => scrollCarousel(-1));
    nextCardBtn.addEventListener("click", () => scrollCarousel(1));
    favoriteFilterBtn.addEventListener("click", () => {
      showFavoritesOnly = !showFavoritesOnly;
      render();
    });
    exportBtn.addEventListener("click", exportCards);
    importInput.addEventListener("change", event => {
      importCards(event.target.files[0]);
      event.target.value = "";
    });
    deleteAllBtn.addEventListener("click", deleteAllCards);
    editForm.addEventListener("submit", event => {
      event.preventDefault();
      updateEditingCard();
    });
    closeDialogBtn.addEventListener("click", () => editDialog.close());
    editForm.querySelector("[data-close-edit]").addEventListener("click", () => editDialog.close());
    editDialog.addEventListener("click", event => {
      if (event.target === editDialog) editDialog.close();
    });


    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js", { updateViaCache: "none" })
          .then(registration => registration.update())
          .catch(error => {
            console.error("Service worker registration failed:", error);
          });
      });
    }

    init();
  </script>
</body>
</html>
